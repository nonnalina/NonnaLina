<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu — My Restaurant</title>
  <style>
    :root{--bg:#fff;--fg:#111;--accent:#d97706;--panel-w:320px}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--fg)}
    header{height:64px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #eee}
    .brand{font-weight:700} .spacer{flex:1}
    .menu-btn{background:transparent;border:0;padding:8px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border-radius:8px}
    .menu-btn:focus{outline:3px solid rgba(217,119,6,0.18);outline-offset:2px}
    .visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap;border:0;padding:0;margin:-1px}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.24);display:none;z-index:15}
    .panel{position:fixed;top:0;right:0;height:100vh;width:var(--panel-w);background:var(--bg);box-shadow:-8px 0 24px rgba(0,0,0,0.08);transform:translateX(100%);transition:transform .25s;z-index:16;padding:16px;display:flex;flex-direction:column}
    .panel.open{transform:translateX(0)} nav ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
    nav a{display:flex;gap:10px;align-items:center;padding:10px;border-radius:8px;text-decoration:none;color:inherit}
    nav a:hover, nav a:focus{background:#f3f4f6}
    .icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center}
    main{padding:20px;max-width:900px;margin:0 auto}
    .dish{display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid #eee;border-radius:8px;margin-bottom:10px}
    footer{padding:16px;text-align:center;border-top:1px solid #eee;margin-top:24px}
  </style>
</head>
<body>
  <header>
    <button id="siteMenuBtn" class="menu-btn" aria-label="Main menu" aria-expanded="false" aria-controls="sitePanel">
      <span class="hamburger" aria-hidden="true">☰</span>
      <span class="visually-hidden">Menu</span>
    </button>

    <div class="brand">My Restaurant</div>
    <div class="spacer"></div>

    <a class="menu-btn" href="menu.html" aria-label="Food menu">
      <span class="icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="10" cy="12" r="6" stroke="currentColor" stroke-width="2"></circle>
          <path d="M18 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          <path d="M20 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </span>
      <span>Menu</span>
    </a>
  </header>

  <div id="backdrop" class="backdrop" hidden></div>

  <aside id="sitePanel" class="panel" role="dialog" aria-labelledby="panelTitle" aria-modal="true" hidden>
    <div style="display:flex;align-items:center;gap:12px">
      <h2 id="panelTitle">Menu</h2>
      <button id="closePanelBtn" aria-label="Close menu" style="margin-left:auto;background:transparent;border:0;font-size:18px;cursor:pointer">✕</button>
    </div>

    <nav aria-label="Main site navigation">
      <ul>
        <li>
          <a href="menu.html" aria-label="Food menu">
            <span class="icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="10" cy="12" r="6" stroke="currentColor" stroke-width="2"></circle>
                <path d="M18 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                <path d="M20 6v12" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </span>
            <span>Menu</span>
          </a>
        </li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a href="index.html#reservations">Reservations</a></li>
      </ul>
    </nav>
  </aside>

  <main>
    <h1>Food Menu</h1>
    <p>Placeholder dish list — replace with your actual dishes. Tell me the submenu items and I'll add them.</p>

    <section aria-label="Dishes">
      <div class="dish">
        <div>
          <div style="font-weight:700">Classic Burger</div>
          <div style="font-size:.9rem;color:#555">Beef, lettuce, tomato</div>
        </div>
        <div style="text-align:right"><div style="font-weight:700">$12</div></div>
      </div>

      <div class="dish">
        <div>
          <div style="font-weight:700">Pasta Primavera</div>
          <div style="font-size:.9rem;color:#555">Seasonal vegetables, garlic</div>
        </div>
        <div style="text-align:right"><div style="font-weight:700">$11</div></div>
      </div>
    </section>
  </main>

  <footer>
    <small>&copy; <span id="year"></span> My Restaurant</small>
  </footer>

  <script>
    const btn = document.getElementById('siteMenuBtn');
    const panel = document.getElementById('sitePanel');
    const backdrop = document.getElementById('backdrop');
    const closeBtn = document.getElementById('closePanelBtn');

    function openPanel(){ panel.removeAttribute('hidden'); backdrop.removeAttribute('hidden'); panel.classList.add('open'); btn.setAttribute('aria-expanded','true'); const first = panel.querySelector('a,button'); if(first) first.focus(); }
    function closePanel(){ panel.classList.remove('open'); panel.setAttribute('hidden',''); backdrop.setAttribute('hidden',''); btn.setAttribute('aria-expanded','false'); btn.focus(); }

    btn.addEventListener('click', ()=> { const expanded = btn.getAttribute('aria-expanded') === 'true'; if(expanded) closePanel(); else openPanel(); });
    closeBtn.addEventListener('click', closePanel);
    backdrop.addEventListener('click', closePanel);
    document.addEventListener('keydown', (e)=> { if(e.key==='Escape' && !panel.hasAttribute('hidden')) closePanel(); if(e.altKey && e.key.toLowerCase()==='m'){ e.preventDefault(); openPanel(); } });
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
