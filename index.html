<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonna Lina | Authentic Italian Cuisine</title>
    <style>
        :root {
            --italian-red: #CD212A;
            --italian-green: #008C45;
            --cream: #F9F6F0;
            --charcoal: #2B2B2B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Logo Styling */
        .logo-container {
            margin-bottom: 30px;
            width: 100%;
            max-width: 220px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--charcoal);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 1.25rem;
            color: #666;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* Accent Line */
        .divider {
            height: 4px;
            width: 60px;
            background: linear-gradient(to right, var(--italian-green) 33%, #FFF 33%, #FFF 66%, var(--italian-red) 66%);
            margin: 0 auto 40px auto;
        }

        .info-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            width: 100%;
        }

        .info-box p {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        /* Clickable Email Button */
        .email-link {
            display: inline-block;
            background-color: var(--charcoal);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: background-color 0.2s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .email-link:hover {
            background-color: var(--italian-red);
            transform: translateY(-1px);
        }

        footer {
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo-container">
            <img src="Square.svg" alt="Nonna Lina Logo">
        </div>

        <h1>Nonna Lina</h1>
        <div class="divider"></div>
        <p class="tagline">Something delicious is simmering.</p>

        <div class="info-box">
            <p>We are currently crafting our digital home to bring the true taste of Italy straight to you.</p>
            <p>For inquiries, bookings, or private events, reach out to us directly:</p>
            
            <!-- Contact Email -->
            <a href="mailto:Francesco@NonnaLina.us" class="email-link">Francesco@NonnaLina.us</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Nonna Lina. All Rights Reserved.
    </footer>

</body>
</html>
