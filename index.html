    <!-- Script to run the Accordion Toggle dynamic expansion -->
    <script>
        const toggleBtn = document.getElementById("toggleStoryBtn");
        const content = document.getElementById("storyContent");
        const arrow = document.getElementById("storyArrow");

        toggleBtn.addEventListener("click", function() {
            // Toggle active visual classes
            toggleBtn.classList.toggle("is-active");
            content.classList.toggle("is-open");
            
            if (content.classList.contains("is-open")) {
                // Calculate height including standard padding buffers safely
                content.style.maxHeight = (content.scrollHeight + 100) + "px";
                arrow.innerHTML = "&#9652;"; // Turn arrow up
            } else {
                content.style.maxHeight = "0";
                arrow.innerHTML = "&#9662;"; // Turn arrow down
            }
        });
    </script>
